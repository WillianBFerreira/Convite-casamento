<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Casamento</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #eef1f5;
  overflow: hidden;
  font-family: 'Playfair Display', serif;
}

/* ABERTURA */
#abertura {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fadeIn 2s ease;
}

.nomes {
  font-family: 'Great Vibes', cursive;
  font-size: 60px;
  color: #5c6f8c;
  opacity: 0;
  animation: aparecer 2s ease forwards;
}

.sub {
  margin-top: 10px;
  letter-spacing: 2px;
  font-size: 14px;
  opacity: 0;
  animation: aparecer 2s ease forwards;
  animation-delay: 1s;
}

.btn {
  margin-top: 40px;
  padding: 12px 30px;
  border: 1px solid #5c6f8c;
  cursor: pointer;
  opacity: 0;
  animation: aparecer 2s ease forwards;
  animation-delay: 2s;
}

.btn:hover {
  background: #5c6f8c;
  color: white;
}

/* CONVITE */
#convite {
  display: none;
  max-width: 650px;
  margin: 50px auto;
  background: white;
  padding: 50px;
  border-radius: 12px;
  animation: subir 1.2s ease;
}

@keyframes aparecer {
  to { opacity: 1; transform: translateY(0); }
  from { opacity: 0; transform: translateY(20px); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes subir {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div id="abertura">
  <div class="nomes">Kimberly & Willian</div>
  <div class="sub">12 de Dezembro de 2026</div>
  <div class="btn" onclick="abrir()">Abrir convite</div>
</div>

<div id="convite">
  <h2>Você está convidado</h2>

  <p>Às 16:30 horas</p>
  <p>Sábado, 12 de dezembro de 2026</p>

  <p><b>Santuário Nossa Senhora das Brotas</b></p>
  <p>Piraí do Sul - PR</p>

  <br>

  <a href="https://noivos.casar.com/kimberleyewillian" target="_blank">
    Confirmar Presença
  </a>
</div>

<script>
function abrir() {
  document.getElementById("abertura").style.display = "none";
  document.body.style.overflow = "auto";
  document.getElementById("convite").style.display = "block";
}
</script>

</body>
</html>
