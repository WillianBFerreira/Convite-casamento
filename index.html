<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Casamento Kimberly & Willian</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #eef1f5;
      font-family: 'Playfair Display', serif;
      color: #5c6f8c;
      text-align: center;
      overflow: hidden;
    }

    /* ABERTURA */
    #abertura {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fadeIn 1.5s ease;
    }

    .envelope {
      width: 450px;
      max-width: 90%;
      cursor: pointer;
      transition: 0.4s;
    }

    .envelope:hover {
      transform: scale(1.05);
    }

    .texto-abrir {
      margin-top: 20px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* CONVITE */
    #convite {
      display: none;
      max-width: 650px;
      margin: 50px auto;
      background: #ffffff;
      padding: 50px 30px;
      border: 1px solid #5c6f8c;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      animation: subir 1.2s ease;
    }

    .titulo {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .nomes {
      font-family: 'Great Vibes', cursive;
      font-size: 52px;
      margin: 20px 0;
    }

    .texto {
      font-size: 18px;
      line-height: 1.6;
      margin: 15px 0;
    }

    .botao {
      margin-top: 30px;
    }

    .botao a {
      text-decoration: none;
      border: 1px solid #5c6f8c;
      padding: 12px 25px;
      color: #5c6f8c;
      transition: 0.3s;
    }

    .botao a:hover {
      background: #5c6f8c;
      color: white;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes subir {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- ABERTURA COM ENVELOPE -->
  <div id="abertura">

    <img src="envelope.png" class="envelope" onclick="abrirConvite()">

    <div class="texto-abrir">Abrir convite</div>

  </div>

  <!-- CONVITE -->
  <div id="convite">

    <div class="titulo">
      Convidam para a cerimônia religiosa de seu casamento:
    </div>

    <div class="nomes">
      Kimberly & Willian
    </div>

    <div class="texto">
      Às <b>16:30 horas</b><br>
      Sábado, 12 de dezembro de 2026
    </div>

    <div class="texto">
      Santuário Nossa Senhora das Brotas<br>
      Piraí do Sul - PR
    </div>

    <div class="texto">
      Após a cerimônia, os convidados serão recepcionados no local
    </div>

    <div class="botao">
      <a href="https://noivos.casar.com/kimberleyewillian" target="_blank">
        Confirmar Presença
      </a>
    </div>

  </div>

  <script>
    function abrirConvite() {
      document.getElementById("abertura").style.display = "none";
      document.getElementById("convite").style.display = "block";
      document.body.style.overflow = "auto";
    }
  </script>

</body>
</html>
