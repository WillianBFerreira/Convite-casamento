<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Casamento Kimberly & Willian</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background-color: #eef1f5;
      color: #5c6f8c;
      text-align: center;
    }

    /* TELA DE ABERTURA */
    .abertura {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #eef1f5;
    }

    .abertura h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
      margin-bottom: 20px;
    }

    .btn-abrir {
      border: 1px solid #5c6f8c;
      padding: 12px 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-abrir:hover {
      background: #5c6f8c;
      color: white;
    }

    /* CONVITE */
    .container {
      display: none;
      max-width: 650px;
      margin: 50px auto;
      background: white;
      padding: 50px 30px;
      border: 1px solid #5c6f8c;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      animation: fade 1.2s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .nomes {
      font-family: 'Great Vibes', cursive;
      font-size: 52px;
      margin: 20px 0;
    }

    .texto {
      font-size: 18px;
      margin: 15px 0;
    }

    .botao {
      margin-top: 30px;
    }

    .botao a {
      text-decoration: none;
      border: 1px solid #5c6f8c;
      padding: 12px 25px;
      color: #5c6f8c;
    }

    .botao a:hover {
      background: #5c6f8c;
      color: white;
    }

  </style>
</head>

<body>

  <!-- ABERTURA -->
  <div class="abertura" id="abertura">
    <h1>Kimberly & Willian</h1>
    <div class="btn-abrir" onclick="abrirConvite()">
      Abrir convite
    </div>
  </div>

  <!-- CONVITE -->
  <div class="container" id="convite">

    <div class="texto">
      Convidam para a cerimônia religiosa de seu casamento:
    </div>

    <div class="nomes">
      Kimberly & Willian
    </div>

    <div class="texto">
      Às <b>16:30 horas</b><br>
      Sábado, 12 de dezembro de 2026
    </div>

    <div class="texto">
      Santuário Nossa Senhora das Brotas<br>
      Piraí do Sul - PR
    </div>

    <div class="botao">
      <a href="https://noivos.casar.com/kimberleyewillian" target="_blank">
        Confirmar Presença
      </a>
    </div>

  </div>

  <script>
    function abrirConvite() {
      document.getElementById("abertura").style.display = "none";
      document.getElementById("convite").style.display = "block";
    }
  </script>

</body>
</html>
